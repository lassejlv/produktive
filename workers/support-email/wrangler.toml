name = "produktive-support-email"
main = "src/index.ts"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat"]

[vars]
SUPPORT_API_URL = "https://produktive.app"
SUPPORT_FROM_EMAIL = "support@produktive.app"
SUPPORT_FALLBACK_FORWARD_EMAIL = ""
MAX_EMAIL_BYTES = "10485760"

[[routes]]
pattern = "support-email.produktive.app"
custom_domain = true

[[send_email]]
name = "EMAIL"
allowed_sender_addresses = ["support@produktive.app"]
