<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produktive — the produktive developer platform</title>
    <meta
      name="description"
      content="Uptime monitoring, log ingestion, and public status pages — one platform for shipping and operating software."
    />
    <meta property="og:title" content="Produktive — the produktive developer platform" />
    <meta
      property="og:description"
      content="Uptime monitoring, log ingestion, and public status pages — one platform for shipping and operating software."
    />
    <meta property="og:type" content="website" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("unstatus.theme");
          var theme = stored === "dark" || stored === "light" ? stored : "light";
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
