<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>unstatus — uptime monitoring with monitor-as-code</title>
    <meta
      name="description"
      content="Probe HTTP, TCP, ICMP, Postgres, Redis, and SSH. Decide health in a small DSL and publish status pages."
    />
    <meta property="og:title" content="unstatus — uptime monitoring with monitor-as-code" />
    <meta
      property="og:description"
      content="Probe HTTP, TCP, ICMP, Postgres, Redis, and SSH. Decide health in a small DSL and publish status pages."
    />
    <meta property="og:type" content="website" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("unstatus.theme");
          var system =
            window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          var theme = stored === "dark" || stored === "light" ? stored : system;
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
