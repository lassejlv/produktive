name: produktive

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    env_file:
      - path: ../.env
        required: false
    environment:
      PORT: 3000
      WEB_DIST_DIR: /app/web/dist
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped

  mcp:
    build:
      context: ..
      dockerfile: Dockerfile.mcp
    env_file:
      - path: ../.env.mcp
        required: false
    environment:
      PORT: 3001
    ports:
      - "${MCP_PORT:-3001}:3001"
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: Dockerfile.bot
    env_file:
      - path: ../.env.bot
        required: false
    environment:
      PORT: 3002
    ports:
      - "${BOT_STATUS_PORT:-3002}:3002"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
      - mcp
      - bot
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      MCP_DOMAIN: ${MCP_DOMAIN:-mcp.localhost}
      BOT_STATUS_DOMAIN: ${BOT_STATUS_DOMAIN:-bot.localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
