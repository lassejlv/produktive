services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-produktive}
      POSTGRES_USER: ${POSTGRES_USER:-produktive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    depends_on:
      postgres:
        condition: service_healthy

  mcp:
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
