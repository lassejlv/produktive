# Produktive custom-domain edge proxy — Cloudflare for SaaS "Workers as origin".
# Handles status-page domains through the app origin and deployment domains by
# resolving the hostname to a provider service URL.
# Deploy:  cd deploy/cloudflare-worker && wrangler deploy
# Tail:    wrangler tail

name = "produktive-custom-domains"
main = "worker.js"
compatibility_date = "2026-06-01"

# Smoke-test URL: produktive-custom-domains.<your-subdomain>.workers.dev
# Lets us verify the Host-rewrite/provider-forwarding logic before touching production routing.
workers_dev = true

# PRODUCTION ROUTE — LIVE (cutover complete). `*/*` catches the whole zone; the Worker
# passes produktive.app + every *.produktive.app subdomain straight through and only
# resolves/re-writes external customer domains. Cloudflare's Worker loop-prevention
# sends the in-zone app-origin subrequest to the origin, so the main app does not loop.
routes = [
  { pattern = "*/*", zone_name = "produktive.app" },
]

[vars]
# Host header the backend/Railway expects (Railway routes by this).
APP_HOST = "produktive.app"
# The app's own zone. produktive.app + every *.produktive.app subdomain (cdn, www,
# the SaaS records, future subdomains) passes through untouched; only external
# customer domains are resolved as deploy domains or rewritten to the app origin.
APP_ZONE = "produktive.app"
# App/API origin the Worker connects to for hostname resolution and status-page
# fallback. No new env is needed for deployment domains; the API returns the target
# provider URL (for example, Cloud Run *.run.app) per hostname.
RAILWAY_ORIGIN_HOST = "produktive.app"
