# Produktive custom-domain edge proxy — Cloudflare for SaaS "Workers as origin".
# Deploy:  cd deploy/cloudflare-worker && wrangler deploy
# Tail:    wrangler tail

name = "produktive-custom-domains"
main = "worker.js"
compatibility_date = "2026-06-01"

# Smoke-test URL: produktive-custom-domains.<your-subdomain>.workers.dev
# Lets us verify the Host-rewrite/forwarding logic BEFORE touching production routing.
workers_dev = true

# PRODUCTION ROUTE — LIVE (cutover complete). `*/*` catches the whole zone; the Worker
# passes produktive.app + every *.produktive.app subdomain straight through and only
# rewrites external customer domains. Cloudflare's Worker loop-prevention sends the
# in-zone subrequest to the origin, so the main app does not loop.
routes = [
  { pattern = "*/*", zone_name = "produktive.app" },
]

[vars]
# Host header the backend/Railway expects (Railway routes by this).
APP_HOST = "produktive.app"
# The app's own zone. produktive.app + every *.produktive.app subdomain (cdn, www,
# the SaaS records, future subdomains) passes through untouched; only external
# customer domains get rewritten to the app origin.
APP_ZONE = "produktive.app"
# Origin the Worker connects to. MUST be produktive.app: Cloudflare Workers force the
# outgoing Host header to match the fetch URL's hostname, so you cannot point this at a
# *.up.railway.app host (Railway then 404s on the wrong Host). produktive.app is proxied,
# and Cloudflare's Worker loop-prevention sends the in-zone subrequest to the origin
# rather than re-invoking this Worker, so the */* route does not loop.
RAILWAY_ORIGIN_HOST = "produktive.app"
