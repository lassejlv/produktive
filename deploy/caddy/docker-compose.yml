services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      UNSTATUS_ORIGIN: ${UNSTATUS_ORIGIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
